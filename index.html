<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI de Objeções — Projuris ADV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #0d1117; --surface: #161b22; --card: #1c2333; --border: #30363d;
  --accent: #1f6feb; --accent2: #388bfd; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --purple: #8b5cf6; --orange: #fb923c; --text: #e6edf3; --muted: #8b949e;
}
body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
header {
  background: linear-gradient(135deg, #0d1117 0%, #1a2744 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 26px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
.logo-text h1 { font-size: 15px; font-weight: 700; }
.logo-text p { font-size: 10px; color: var(--muted); }
.live-badge { background: #f85149; color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.main { padding: 18px 26px; max-width: 1440px; margin: 0 auto; }
.input-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 20px; margin-bottom: 18px; }
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 14px; }
.input-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.field label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
select, textarea {
  width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); padding: 9px 12px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s;
}
select:focus, textarea:focus { border-color: var(--accent); }
select option { background: var(--card); }
textarea { resize: vertical; min-height: 52px; }
.analyze-btn {
  width: 100%; margin-top: 12px;
  background: linear-gradient(135deg, #1f6feb, #8b5cf6);
  border: none; border-radius: 9px; color: #fff; padding: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
}
.analyze-btn:hover { opacity: 0.87; }
.analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.loader { display: none; text-align: center; padding: 28px; }
.loader.visible { display: block; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.results { display: none; }
.results.visible { display: block; }
.status-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; position: relative; overflow: hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.stat-card.blue::before { background: var(--accent2); }
.stat-card.purple::before { background: var(--purple); }
.stat-card.green::before { background: var(--green); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.red::before { background: var(--red); }
.stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.stat-val { font-size: 13px; font-weight: 700; line-height: 1.3; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
.risk-bar { height: 4px; background: var(--card); border-radius: 3px; margin-top: 5px; overflow: hidden; }
.risk-fill { height: 100%; border-radius: 3px; }
.na-bar {
  background: linear-gradient(135deg, rgba(31,111,235,0.1), rgba(139,92,246,0.1));
  border: 1px solid rgba(56,139,253,0.35); border-radius: 11px; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 16px;
}
.na-left { flex: 1; }
.na-tag { display: inline-block; color: #fff; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.na-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; color: var(--accent2); }
.na-detail { font-size: 12px; color: #cdd9e5; line-height: 1.6; }
.na-right { flex-shrink: 0; }
.na-risk-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; border: 3px solid; }
.na-risk-lbl { font-size: 8px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
/* 3-col grid */
.tri { display: grid; grid-template-columns: 1.15fr 0.95fr 0.9fr; gap: 14px; margin-bottom: 14px; }
.bot { display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.ph { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; padding-bottom: 11px; border-bottom: 1px solid var(--border); }
.pi { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.pt { font-size: 13px; font-weight: 700; }
.ps { font-size: 10px; color: var(--muted); }
/* SCRIPT HERO */
.script-hero { background: linear-gradient(135deg, rgba(31,111,235,0.07), rgba(139,92,246,0.07)); border: 1px solid rgba(139,92,246,0.38); border-radius: 12px; padding: 18px; }
.sh-header { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
.sh-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.sh-title { font-size: 14px; font-weight: 800; }
.sh-sub { font-size: 10px; color: var(--muted); }
.script-tabs { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
.script-tab { padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--muted); transition: all 0.12s; }
.script-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.script-variant { display: none; }
.script-variant.active { display: block; }
.s-ctx { display: inline-flex; align-items: center; gap: 4px; background: rgba(56,139,253,0.1); border: 1px solid rgba(56,139,253,0.28); color: var(--accent2); padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; margin-bottom: 9px; }
.s-body { font-size: 12.5px; line-height: 1.78; color: #cdd9e5; background: var(--card); border-radius: 8px; padding: 13px 15px; border-left: 3px solid var(--purple); }
.s-note { margin-top: 9px; font-size: 10.5px; color: var(--muted); padding-top: 9px; border-top: 1px solid var(--border); }
/* TRIGGERS */
.trig-grid { display: grid; grid-template-columns: 1fr; gap: 7px; }
.trig-item { border-radius: 8px; padding: 9px 11px; border: 1px solid; }
.trig-name { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
.trig-how { font-size: 10.5px; line-height: 1.4; }
.trig-item.urgencia { background: rgba(248,81,73,0.07); border-color: rgba(248,81,73,0.38); color: #f85149; }
.trig-item.perda { background: rgba(210,153,34,0.07); border-color: rgba(210,153,34,0.38); color: #d29922; }
.trig-item.prova { background: rgba(63,185,80,0.07); border-color: rgba(63,185,80,0.38); color: #3fb950; }
.trig-item.autoridade { background: rgba(139,92,246,0.07); border-color: rgba(139,92,246,0.38); color: #8b5cf6; }
.trig-item.escassez { background: rgba(251,146,60,0.07); border-color: rgba(251,146,60,0.38); color: #fb923c; }
/* QUESTIONS */
.questions { list-style: none; }
.questions li { background: var(--card); border-radius: 7px; padding: 9px 12px; margin-bottom: 6px; font-size: 12px; line-height: 1.5; border-left: 3px solid var(--accent2); display: flex; gap: 8px; align-items: flex-start; }
.qn { width: 16px; height: 16px; background: var(--accent2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; color: #fff; margin-top: 2px; }
/* STEPS */
.steps { list-style: none; }
.steps li { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; font-size: 12px; line-height: 1.5; }
.steps li:last-child { border-bottom: none; }
.sn { width: 20px; height: 20px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.st strong { color: var(--accent2); display: block; font-size: 10px; margin-bottom: 1px; }
/* DIAG */
.diag-box { background: var(--card); border-left: 3px solid var(--purple); border-radius: 7px; padding: 11px 13px; margin-bottom: 9px; font-size: 12px; line-height: 1.6; }
.diag-box strong { color: var(--purple); }
/* SIGNALS */
.sig { padding: 9px 12px; border-radius: 7px; font-size: 11px; margin-bottom: 6px; line-height: 1.5; }
.sig.ok { background: rgba(63,185,80,0.07); border: 1px solid rgba(63,185,80,0.28); }
.sig.warn { background: rgba(248,81,73,0.07); border: 1px solid rgba(248,81,73,0.28); }
.ctx-box { background: var(--card); border-left: 3px solid var(--accent2); border-radius: 7px; padding: 10px 13px; margin-top: 10px; font-size: 11px; line-height: 1.55; }
.ctx-box strong { color: var(--accent2); }
@media (max-width: 1100px) {
  .tri { grid-template-columns: 1fr 1fr; }
  .bot { grid-template-columns: 1fr; }
  .status-bar { grid-template-columns: repeat(3,1fr); }
}
@media (max-width: 700px) {
  .tri, .bot, .status-bar { grid-template-columns: 1fr; }
  .main { padding: 12px; }
  header { padding: 12px 14px; }
  .input-grid { grid-template-columns: 1fr; }
  .na-bar { flex-direction: column; }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">⚖️</div>
    <div class="logo-text">
      <h1>BI de Objeções — Projuris ADV</h1>
      <p>Sistema de Contorno para Closers · Uso em Call</p>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div> AO VIVO</div>
</header>

<div class="main">
  <div class="input-panel">
    <div class="section-label">📥 Configurar situação da call</div>
    <div class="input-grid">
      <div class="field">
        <label>Objeção do cliente</label>
        <select id="objection">
          <option value="">— Selecione a objeção recebida —</option>
          <optgroup label="⏰ TIMING / POSTERGAÇÃO">
            <option value="analisar_geral">🕐 "Vou analisar e te retorno" (genérico)</option>
            <option value="analisar_reuniao">"Preciso apresentar em reunião interna primeiro"</option>
            <option value="momento_ruim">"Agora não é o momento / estamos ocupados"</option>
            <option value="ferias">"Estamos de recesso / virada de ano"</option>
            <option value="inicio_ano">"Começa no início do ano / primeiro trimestre"</option>
          </optgroup>
          <optgroup label="👥 AUTORIDADE / DECISÃO">
            <option value="socio">👥 "Preciso falar com meu sócio"</option>
            <option value="socio_ausente">"Meu sócio não estava nessa call"</option>
            <option value="comite">"Precisa passar pelo comitê / gestor"</option>
          </optgroup>
          <optgroup label="💸 FINANCEIRA / PREÇO">
            <option value="caro">💸 "Está caro / não tenho orçamento"</option>
            <option value="caro_concorrente">"O concorrente cobra menos"</option>
            <option value="desconto">"Consegue dar desconto?"</option>
            <option value="sem_budget">"Não temos budget aprovado"</option>
          </optgroup>
          <optgroup label="🔄 CONCORRÊNCIA / STATUS QUO">
            <option value="concorrente_sistema">🔄 "Já usamos outro sistema"</option>
            <option value="concorrente_satisfeito">"Estamos satisfeitos com o que temos"</option>
            <option value="migracao">"Migrar é muito trabalhoso"</option>
            <option value="planilha">"Usamos planilha e funciona"</option>
          </optgroup>
          <optgroup label="🤷 VALOR / NECESSIDADE">
            <option value="necessidade">🤷 "Não vejo necessidade agora"</option>
            <option value="pequeno_demais">"Somos pequenos demais para isso"</option>
            <option value="poucos_processos">"Temos poucos processos, não compensa"</option>
            <option value="ja_funciona">"A gente já se vira bem sem sistema"</option>
          </optgroup>
          <optgroup label="😰 RISCO / MEDO">
            <option value="medo_implantacao">"Não tenho tempo para implantação"</option>
            <option value="medo_equipe">"Minha equipe não vai aderir"</option>
            <option value="medo_dados">"Tenho receio de segurança dos dados"</option>
            <option value="ja_tentou">"Já tentei software antes e não funcionou"</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>Tamanho do escritório</label>
        <select id="size">
          <option value="pequeno">🔹 Pequeno (1–5 adv.)</option>
          <option value="medio">🔸 Médio (6–20 adv.)</option>
          <option value="grande">🔷 Grande (20+ adv.)</option>
        </select>
      </div>
      <div class="field">
        <label>Momento da call</label>
        <select id="moment">
          <option value="meio">🎯 Meio (pós-apresentação)</option>
          <option value="fechamento">🔥 Fechamento</option>
          <option value="inicio">🚀 Início / qualificação</option>
          <option value="follow">📞 Follow-up (2ª+ call)</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Contexto adicional (opcional — dor mapeada, nome, detalhe relevante)</label>
      <textarea id="context" placeholder="Ex: Escritório de família, 3 advogados, perdeu prazo no mês passado, nunca usou software, sócio está na call..."></textarea>
    </div>
    <button class="analyze-btn" onclick="analyze()" id="btn">⚡ GERAR ESTRATÉGIA AGORA</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:13px">Montando estratégia...</p>
  </div>

  <div class="results" id="results">
    <div class="status-bar" id="statusBar"></div>
    <div id="nextBar"></div>
    <div class="tri" id="triGrid"></div>
    <div class="bot" id="botGrid"></div>
  </div>
</div>

<script>
const DATA = {
  analisar_geral:{tipo:"Postergação genérica",classe:"⏰ Timing",risco:65,riscoLabel:"Médio-Alto",riscoCor:"#d29922",proximaAcao:"fechar",
    scriptVariants:[
      {label:"Padrão",ctx:"Qualquer momento",fala:`"[Nome], entendo. Antes de você ir analisar — me diz uma coisa: quando você fala em analisar, tem alguma parte específica que ficou com dúvida? Porque se tiver, prefiro resolver agora do que você ficar com uma impressão errada. [Pausa e escuta] ...O que me preocupa: a gente mapeou que o escritório está enfrentando [dor específica]. Isso vai continuar acontecendo enquanto a decisão não sai. Sabe o que eu proponho? Fecha comigo hoje, e se em 30 dias não fizer sentido, a gente desfaz sem burocracia. Assim você analisa usando a ferramenta de verdade."`,nota:"Substitua [dor específica] pela dor real que ele mencionou. O risco zero é safety net — use depois de reancorar valor, nunca antes."},
      {label:"Follow-up (2ª call)",ctx:"Depois de recontato",fala:`"[Nome], a gente já conversou na semana passada e você ia analisar. Quero ser direto: o que faltou para você se sentir seguro para decidir? Pode ser preço, dúvida técnica, algo interno — me conta que a gente resolve agora."`,nota:"No follow-up, seja direto. Se ele não decidiu após analisar, a objeção real ainda não foi revelada."}
    ],
    triggers:[{tipo:"urgencia",como:"Mostre o custo de cada semana sem resolver — horas perdidas, risco de prazo, retrabalho."},{tipo:"perda",como:"'Cada mês sem o sistema é [X] horas que não voltam.' Faça a conta com ele."}],
    perguntas:["O que exatamente você precisa analisar? Me ajuda a entender o que ficou em aberto.","Se eu resolver essa dúvida agora, você teria como decidir ainda hoje?","O [problema que você me contou] vai continuar acontecendo durante esse período de análise?","Quanto tempo você costuma levar para tomar decisões como essa no escritório?","O que precisa acontecer para você se sentir confortável em fechar?"],
    conducao:[{t:"Validar",d:"'Faz sentido analisar' — nunca confronte diretamente."},{t:"Isolar",d:"Pergunte o que exatamente ele quer analisar. Escute com atenção."},{t:"Reancorar na dor",d:"Traga de volta o problema que ele mesmo descreveu."},{t:"Criar urgência real",d:"Monte a conta do custo mensal do problema."},{t:"Fechar com saída fácil",d:"Ofereça teste/garantia como rede de segurança — depois do valor, não antes."}],
    diag:"<strong>O real:</strong> Não viu valor suficiente para decidir agora. 'Vou analisar' é fuga educada. <strong>Atenção:</strong> Se surgiu após demo, o problema é ancoragem de dor. Se no fechamento, é falta de comprometimento.",
    alertas:[{tp:"warn",txt:"⚠️ Insistindo demais: Se você continuar apresentando features depois dessa objeção, está errando. O problema não é informação — é urgência."},{tp:"ok",txt:"✅ Isolar a objeção é a jogada certa: Pergunte o que ele quer analisar antes de qualquer argumento."}]
  },
  analisar_reuniao:{tipo:"Postergação por processo interno",classe:"⏰ Timing",risco:55,riscoLabel:"Médio",riscoCor:"#d29922",proximaAcao:"socio",
    scriptVariants:[{label:"Padrão",ctx:"Escritório com mais de 1 sócio",fala:`"Perfeito, faz total sentido alinhar internamente. Me ajuda com uma coisa: quando você apresentar para a sua equipe/sócios, quais vão ser as perguntas que eles vão fazer? Porque quero garantir que você tenha todas as respostas. [Escuta] ...Sabe o que vai funcionar melhor? A gente marca uma call rápida de 20 minutos com você e eles juntos. Você apresentou o problema — eu trago os números, eles decidem. Quando fica melhor: quinta ou sexta dessa semana?"`,nota:"O objetivo é garantir acesso à reunião interna. Sem isso, você perde o controle da negociação."}],
    triggers:[{tipo:"autoridade",como:"Posicione você como o especialista que vai apoiar a apresentação interna."},{tipo:"prova",como:"'Posso trazer um case de escritório parecido para essa reunião.'"}],
    perguntas:["Quem vai estar nessa reunião? São tomadores de decisão ou precisam escalar?","Que argumentos você acha que eles vão questionar mais — preço, implementação ou necessidade?","Posso te mandar material específico para você apresentar para eles? Ou melhor: posso estar nessa call?","Quando é essa reunião?"],
    conducao:[{t:"Valorizar a iniciativa",d:"'Ótimo que vai apresentar internamente — esse é o caminho certo.'"},{t:"Se tornar aliado",d:"Ofereça apoio: material, script ou presença na reunião."},{t:"Mapear os decisores",d:"Quem vai estar e qual o papel de cada um?"},{t:"Garantir acesso",d:"Proponha estar presente — seja em call ou pessoalmente."},{t:"Fechar com data",d:"Saia com data da reunião deles e follow-up agendado no dia seguinte."}],
    diag:"<strong>O real:</strong> Processo de decisão coletivo — comum em médios e grandes escritórios. <strong>Risco:</strong> Você fica de fora e alguém sem preparo derruba a venda.",
    alertas:[{tp:"warn",txt:"⚠️ Enviar proposta por e-mail sem estar na reunião é quase certeza de perda silenciosa."},{tp:"ok",txt:"✅ Transforme o interlocutor no seu aliado interno — prepare ele para defender a solução."}]
  },
  momento_ruim:{tipo:"Timing / Falta de urgência",classe:"⏰ Timing",risco:70,riscoLabel:"Alto",riscoCor:"#f85149",proximaAcao:"nutrir",
    scriptVariants:[
      {label:"Padrão",ctx:"Qualquer momento",fala:`"Entendo, [nome] — o timing importa. Me ajuda a entender: o que está acontecendo agora que torna esse momento mais difícil? [Escuta] ...Ok, então de [data X] em diante a janela abre. O que eu quero garantir é que quando chegar esse momento, você não vai estar começando do zero. A maioria dos escritórios que espera descobre que o custo de não resolver durante esse período é maior do que o custo da ferramenta. [Pausa] ...Posso te propor: a gente fecha hoje com início de implantação para [data que faz sentido]. Você não usa agora — mas garante a condição de hoje e a vaga de onboarding."`,nota:"'Início postergado' é uma saída poderosa. Mantém o fechamento hoje sem pressionar o uso imediato."},
      {label:"Dor urgente evidente",ctx:"Cliente com dor clara",fala:`"[Nome], entendo que o momento é corrido — mas me diz: o [problema que você me contou] vai continuar acontecendo durante esse período? Porque se sim, a pergunta não é se você vai resolver — é quando. E quanto mais cedo, menor o acúmulo. Vamos pelo menos garantir a condição de hoje?"`,nota:"Use quando a dor é clara e urgente. Conecte o timing à permanência do problema."}
    ],
    triggers:[{tipo:"perda",como:"'Cada mês parado é [X] horas perdidas / risco operacional que continua existindo.'"},{tipo:"urgencia",como:"Mostre que a condição atual não vai estar disponível depois — preço, bônus de implantação, vaga no onboarding."}],

  migracao:{tipo:"Medo de migração",classe:"🔄 Concorrência",risco:50,riscoLabel:"Médio",riscoCor:"#d29922",proximaAcao:"demo",
    scriptVariants:[{label:"Padrão",ctx:"Qualquer porte",fala:`"Faz total sentido se preocupar com a migração — é o maior medo de quem já tem um sistema rodando. Me conta: o que especificamente te preocupa mais — perda de dados, tempo parado, treinamento da equipe? [Escuta] ...Então o que te tranquilizaria saber: a migração do Projuris tem [X processos/dados históricos] transferidos pela nossa equipe. Você não precisa fazer nada — a gente assume. E o escritório nunca fica sem sistema durante a transição. Posso te mostrar como isso funciona na prática?"`,nota:"Destrinche o medo. Migração é objeto vago — torne concreto o que assusta e resolva item por item."}],

  planilha:{tipo:"Status quo manual",classe:"🔄 Concorrência",risco:55,riscoLabel:"Médio",riscoCor:"#d29922",proximaAcao:"demo",
    scriptVariants:[{label:"Padrão",ctx:"Pequenos e médios escritórios",fala:`"Entendo, [nome] — e planilha funciona até certo ponto. Me conta uma coisa: quando você tem mais de [X] processos rodando ao mesmo tempo, como você garante que nenhum prazo escapa? [Escuta] ...E quando um advogado tira férias ou sai do escritório, o que acontece com as informações que só estavam com ele? [Escuta] ...É exatamente isso. A planilha funciona quando tudo está certo — o problema é quando algo sai do previsto. Posso te mostrar em 10 minutos o que muda na prática?"`,nota:"Não ataque a planilha — ela funciona. Mostre onde ela falha. E faça o cliente descrever essa falha, não você."}],

    alertas:[{tp:"ok",txt:"✅ 'Já aconteceu de quase perder um prazo?' é a pergunta que abre essa objeção. A maioria vai dizer que sim."},{tp:"warn",txt:"⚠️ Se você atacar a planilha diretamente, o cliente vai defendê-la. Deixe ele descrever as limitações."}]

  necessidade:{tipo:"Negação de dor",classe:"🤷 Valor",risco:75,riscoLabel:"Alto",riscoCor:"#f85149",proximaAcao:"qualificar",
    scriptVariants:[{label:"Padrão",ctx:"Qualquer momento",fala:`"Entendo, [nome] — e respeito isso. Me ajuda a entender melhor como o escritório funciona hoje. Não para vender nada agora, mas porque pode ser que realmente não faça sentido para vocês. Me conta: como é o dia a dia do controle de prazos? [Escuta profunda] ...E quando tem um processo novo abrindo, como a equipe fica sabendo o que precisa ser feito? [Escuta] ...Deixa eu te mostrar uma coisa: um escritório em [estado] com o mesmo perfil do de vocês implementou o Projuris e em 60 dias reduziu [X] horas por semana de controle manual. Você toparia ver como funciona na prática, em 15 minutos? Se não fizer sentido, a gente não perde mais tempo."`,nota:"Seja genuinamente curioso sobre a operação. Clientes percebem quando você investiga para ajudar vs para vender."}],
    triggers:[{tipo:"prova",como:"Cases de escritórios similares que 'também não achavam que precisavam' — até ver o impacto."},{tipo:"perda",como:"Mostre o que o escritório está deixando de ganhar / o risco que corre sem perceber."}],
    perguntas:["Como funciona hoje o controle de prazos no escritório? Me explica o processo do dia a dia.","Quando você tem um processo novo, como a equipe sabe o que precisa ser feito e quando?","Já aconteceu de algum prazo apertar mais do que deveria? Como foi resolvido?","Como você sabe, hoje, se um cliente está sendo bem atendido ou não?","Se eu te mostrasse que escritórios com o mesmo perfil estão economizando X horas por semana, isso te interessaria?"],
    conducao:[{t:"Não apresentar solução ainda",d:"Investigar a realidade operacional primeiro — sempre."},{t:"Perguntas de processo",d:"Como funciona o dia a dia? Onde as coisas quebram?"},{t:"Usar espelho",d:"Mostre como funciona hoje vs como poderia funcionar."},{t:"Cases similares",d:"'Um escritório igual ao de vocês estava na mesma situação até...'"},{t:"Qualificar honestamente",d:"Se não houver dor real, desqualifique. Isso gera confiança."}],
    diag:"<strong>O real:</strong> O cliente não conectou a solução à dor dele. Pode ser: (1) não tem o problema, (2) não percebeu ainda, (3) normaliza como inevitável. <strong>Atenção:</strong> Se você apresentou produto antes de mapear dor, esse é o resultado.",
    alertas:[{tp:"warn",txt:"⚠️ Se você já mostrou o produto e ele disse 'não vejo necessidade', você apresentou antes do diagnóstico. Dor primeiro, produto depois."},{tp:"ok",txt:"✅ Fale menos, ouça mais. Essa objeção é resolvida com perguntas, não com argumentos."}]
  },

    triggers:[{tipo:"prova",como:"Cases específicos de escritórios pequenos (1–3 advogados) que adotaram o Projuris."},{tipo:"perda",como:"'O que você deixa de faturar por estar resolvendo operacional em vez de atender cliente?'"}],

  poucos_processos:{tipo:"Volume como justificativa",classe:"🤷 Valor",risco:55,riscoLabel:"Médio",riscoCor:"#d29922",proximaAcao:"qualificar",
    scriptVariants:[{label:"Padrão",ctx:"Escritórios pequenos ou nicho",fala:`"Entendo. Me conta: quantos processos vocês têm ativos hoje? [Escuta] ...[X] processos. E cada processo tem quantos prazos em média? [Escuta] ...Então você tem [Y] prazos para controlar. Agora: um prazo perdido num processo custaria quanto — em multa, retrabalho ou dano ao cliente? [Escuta] ...Então o sistema se paga com um único prazo salvo. Não é uma questão de volume — é de risco."`,nota:"Volume não é o argumento certo — risco é. Um único prazo perdido pode custar mais do que anos de sistema."}],
    triggers:[{tipo:"perda",como:"'Quanto custa um único prazo perdido? Multa, processo disciplinar, perda de cliente?'"},{tipo:"urgencia",como:"O risco existe independentemente do volume — não precisa ter 500 processos para perder um prazo."}],
    perguntas:["Quantos processos têm ativos agora? E quantos prazos em média por processo?","Quanto custaria perder um prazo num dos processos mais importantes?","Como você controla os prazos hoje? Funciona 100% ou já teve susto?"],

    diag:"<strong>O real:</strong> O cliente mede necessidade por volume, não por risco. A lógica certa: 1 processo importante perdido pode custar mais do que o sistema por anos.",
    alertas:[{tp:"ok",txt:"✅ 'Quanto custa perder um prazo?' muda completamente o critério de decisão. Use essa pergunta cedo."}]

  ja_funciona:{tipo:"Inércia / status quo",classe:"🤷 Valor",risco:65,riscoLabel:"Médio-Alto",riscoCor:"#d29922",proximaAcao:"qualificar",
    scriptVariants:[{label:"Padrão",ctx:"Qualquer porte",fala:`"[Nome], respeito muito isso. Me deixa fazer só uma pergunta: 'funciona' significa que vocês nunca têm problema, ou significa que vocês deram um jeito de resolver os problemas quando aparecem? [Escuta] ...Essa é a diferença. Dar um jeito resolve. Mas quanto tempo e energia vai para dar esse jeito? E quanto isso custa quando dá errado? É só isso que quero mostrar."`,nota:"'Funciona' e 'está ótimo' são coisas diferentes. Ajude o cliente a perceber sem ser agressivo."}],

  socio:{label:"📅 MARCAR COM SÓCIO/DECISOR",cor:"#388bfd",detail:"Saia com data e horário da call com o sócio confirmados. Envie convite imediatamente. Nunca envie proposta antes."},
  proposta:{label:"📄 PROPOSTA COM ROI",cor:"#d29922",detail:"Envie proposta personalizada com análise de ROI baseada nos dados do cliente. Inclua prazo de validade (5 dias úteis). Nunca tabela de preços genérica."},
  nutrir:{label:"🗓️ FOLLOW-UP COM DATA DURA",cor:"#8b5cf6",detail:"Se não fechar agora, saia com data exata acordada. Mais de 14 dias sem contato = lead resfriado. Considere remover do pipeline ativo."},
  demo:{label:"🎯 DEMO FOCADA NO GAP",cor:"#fb923c",detail:"Agende demo específica nas funcionalidades que resolvem o gap identificado. Nunca demo genérica para quem já tem solução."},
  qualificar:{label:"🔍 QUALIFICAR / DESCOBRIR DOR",cor:"#f85149",detail:"Se após 3 perguntas não surgir dor real, desqualifique com elegância: 'Posso entrar em contato em 3 meses?' — isso preserva o relacionamento."}
};
const TRIG={
  urgencia:{cls:"urgencia",ico:"⏰",nm:"Urgência"},
  perda:{cls:"perda",ico:"😰",nm:"Perda / Medo"},
  prova:{cls:"prova",ico:"🏆",nm:"Prova Social"},
  autoridade:{cls:"autoridade",ico:"🎓",nm:"Autoridade"},
  escassez:{cls:"escassez",ico:"⚡",nm:"Escassez"}
};

let activeV=0;
function analyze(){
  const obj=document.getElementById('objection').value;
  if(!obj){alert('Selecione a objeção antes de analisar.');return;}
  const size=document.getElementById('size').value;
  document.getElementById('loader').className='loader visible';
  document.getElementById('results').className='results';
  document.getElementById('btn').disabled=true;
  activeV=0;
  setTimeout(()=>{
    document.getElementById('loader').className='loader';
    document.getElementById('btn').disabled=false;
    render(obj,size);
  },800);
}
function setV(i){
  activeV=i;
  document.querySelectorAll('.script-tab').forEach((t,j)=>t.className='script-tab'+(j===i?' active':''));
  document.querySelectorAll('.script-variant').forEach((v,j)=>v.className='script-variant'+(j===i?' active':''));
}
function render(obj,size){
  const d=DATA[obj];const o=OFFICE[size];const p=PROX[d.proximaAcao];
  const rc=d.riscoCor;const rp=d.risco;const ctx=document.getElementById('context').value;

  // STATUS
  document.getElementById('statusBar').innerHTML=`
    <div class="stat-card blue"><div class="stat-label">Objeção</div><div class="stat-val">${d.classe}</div><div class="stat-sub">${d.tipo}</div></div>
    <div class="stat-card ${rp>=65?'red':rp>=45?'yellow':'green'}"><div class="stat-label">Risco de Perda</div><div class="stat-val" style="color:${rc}">${d.riscoLabel}</div><div class="risk-bar"><div class="risk-fill" style="width:${rp}%;background:${rc}"></div></div><div class="stat-sub">${rp}% estimado</div></div>
    <div class="stat-card green"><div class="stat-label">Próxima Ação</div><div class="stat-val" style="font-size:11px;color:${p.cor}">${p.label}</div></div>
    <div class="stat-card yellow"><div class="stat-label">Escritório</div><div class="stat-val" style="font-size:11px">${o.label}</div><div class="stat-sub">${o.dica}</div></div>
    <div class="stat-card purple"><div class="stat-label">Gatilhos</div><div class="stat-val" style="font-size:11px;line-height:1.5">${d.triggers.map(t=>TRIG[t.tipo].ico+' '+TRIG[t.tipo].nm).join(' · ')}</div></div>
  `;

  // NEXT ACTION
  document.getElementById('nextBar').innerHTML=`
    <div class="na-bar">
      <div class="na-left">
        <div class="na-tag" style="background:${p.cor}">${p.label}</div>
        <div class="na-title">Próxima Ação Recomendada</div>
        <div class="na-detail">${p.detail}</div>
        ${ctx?`<div class="ctx-box" style="margin-top:10px"><strong>Contexto informado:</strong><br>${ctx}</div>`:''}
      </div>
      <div class="na-right">
        <div class="na-risk-circle" style="color:${rc};border-color:${rc}">${rp}%<div class="na-risk-lbl" style="color:${rc}">${d.riscoLabel}</div></div>
      </div>
    </div>
  `;

  // SCRIPT
  const tabs=d.scriptVariants.map((v,i)=>`<div class="script-tab${i===0?' active':''}" onclick="setV(${i})">${v.label}</div>`).join('');
  const variants=d.scriptVariants.map((v,i)=>`
    <div class="script-variant${i===0?' active':''}">
      <div class="s-ctx">📍 ${v.ctx}</div>
      <div class="s-body">${v.fala}</div>
      <div class="s-note">📌 ${v.nota}</div>
    </div>`).join('');

  // TRI GRID: script | gatilhos | perguntas
  document.getElementById('triGrid').innerHTML=`
    <div class="script-hero">
      <div class="sh-header"><div class="sh-icon">💬</div><div><div class="sh-title">Fala Sugerida</div><div class="sh-sub">Use agora — adapte ao seu estilo</div></div></div>
      <div class="script-tabs">${tabs}</div>
      ${variants}
    </div>
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(251,146,60,0.16)">🧲</div><div><div class="pt">Gatilhos Ideais</div><div class="ps">Ative esses na conversa</div></div></div>
      <div class="trig-grid">${d.triggers.map(t=>{const i=TRIG[t.tipo];return`<div class="trig-item ${i.cls}"><div class="trig-name">${i.ico} ${i.nm}</div><div class="trig-how">${t.como}</div></div>`;}).join('')}</div>
    </div>
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(56,139,253,0.16)">❓</div><div><div class="pt">Perguntas Estratégicas</div><div class="ps">Escolha 2–3 para a call</div></div></div>
      <ul class="questions">${d.perguntas.map((q,i)=>`<li><div class="qn">${i+1}</div><span>${q}</span></li>`).join('')}</ul>
    </div>
  `;

  // BOT GRID: condução | diagnóstico + alertas
  document.getElementById('botGrid').innerHTML=`
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(31,111,235,0.16)">🧭</div><div><div class="pt">Linha de Condução</div><div class="ps">Passo a passo para essa call</div></div></div>
      <ol class="steps">${d.conducao.map((s,i)=>`<li><div class="sn">${i+1}</div><div class="st"><strong>${s.t}</strong>${s.d}</div></li>`).join('')}</ol>
    </div>
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(139,92,246,0.16)">🔎</div><div><div class="pt">Diagnóstico</div><div class="ps">O que está por trás</div></div></div>
      <div class="diag-box">${d.diag}</div>
      ${d.alertas.map(a=>`<div class="sig ${a.tp==='ok'?'ok':'warn'}">${a.txt}</div>`).join('')}
    </div>
  `;

  document.getElementById('results').className='results visible';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
